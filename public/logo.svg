<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Dark green panel -->
  <path d="M10 20 L55 10 L65 55 L20 65 Z" fill="#0f5c38" stroke="#ffffff" stroke-width="1" filter="url(#shadow)"/>
  <!-- Tan panel -->
  <path d="M25 60 L70 50 L80 95 L35 90 Z" fill="#c4a574" stroke="#ffffff" stroke-width="1" filter="url(#shadow)"/>
  <!-- Light blue panel -->
  <path d="M60 15 L90 25 L85 60 L55 55 Z" fill="#8cbdb9" stroke="#ffffff" stroke-width="1" filter="url(#shadow)"/>
  <!-- Connection lines -->
  <line x1="32" y1="32" x2="72" y2="38" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="52" y2="72" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="32" cy="32" r="5" fill="#ffffff"/>
  <circle cx="72" cy="38" r="5" fill="#ffffff"/>
  <circle cx="52" cy="72" r="5" fill="#ffffff"/>
</svg>
